name: Deploy to custom linux server

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js environment
        uses: actions/setup-node@v4.0.3
        with:
          node-version: 20.16.0

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: ssh-scp-ssh-pipelines
        # You may pin to the exact commit or the version.
        # uses: cross-the-world/ssh-scp-ssh-pipelines@78e864b4890087a58248ff39320406971ca88b89
        uses: cross-the-world/ssh-scp-ssh-pipelines@v1.1.4
        with:
          # ssh remote host
          host: ${{ secrets.SSH_REMOTE_HOST }}
          # ssh remote port
          port: ${{ secrets.SSH_REMOTE_PORT }}
          # ssh remote user
          user: ${{ secrets.SSH_REMOTE_USER }}
          # content of ssh private key. ex raw content of ~/.ssh/id_rsa
          key: ${{ secrets.SSH_REMOTE_KEY }}
          # scp from local to remote
          scp: |
             ./dist/* => /home/${{ secrets.SSH_REMOTE_USER }}/deployments/portfolio
